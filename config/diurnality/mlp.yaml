data:
  copies: 1
  transformations:
    - name: center
      parameters: {}
    - name: reshape
      parameters:
        shape: [600] # flatten the point cloud to a 1D vector of length 600 (3 features * 200 points)

  split:
    type: species
    seed: 
    train_ratio: 0.8

  task:
    input: x # x denotes the point cloud
    output: diurnality

model:
  type: mlp
  mlp_layers:
  - in_channel: 600
    out_channel: 512
    bn: true
    dropout: 0.5
  - in_channel: 512
    out_channel: 512
    bn: true
    dropout: 0.5
  - in_channel: 512
    out_channel: 256 
    bn: true
    dropout: 0.5
  - in_channel: 256
    out_channel: 128 
    bn: true
    dropout: 0.5
  - in_channel: 128
    out_channel: 64 
    bn: true
    dropout: 0.5
  - in_channel: 64
    out_channel: 16 
    bn: true
    dropout: 0.5
  - in_channel: 16
    out_channel: 3 # this should be equal to num_classes 
  
training:
  gpu: true
  optimizer:
    type: adam
    learning_rate: 0.001
  loss: cross_entropy
  scheduler:
    type: plateau
    scheduler_step_size: 10
    scheduler_gamma: 0.1  
  batch_size: 100 #100
  epochs: 2



